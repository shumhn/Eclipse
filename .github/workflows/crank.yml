name: Crank expired markets

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run-crank:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    env:
      APP_URL: ${{ vars.ECLIPSE_APP_URL || 'https://eclipse-predict.vercel.app' }}
      CRANK_SECRET: ${{ secrets.CRANK_SECRET }}
    steps:
      - name: Trigger Eclipse crank
        run: |
          if [ -z "$CRANK_SECRET" ]; then
            echo "Missing GitHub Actions secret: CRANK_SECRET"
            exit 1
          fi

          curl --fail --show-error --silent --max-time 55 \
            -H "Authorization: Bearer $CRANK_SECRET" \
            -H "x-crank-secret: $CRANK_SECRET" \
            "$APP_URL/api/crank/run?limit=10"
