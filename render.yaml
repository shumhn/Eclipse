services:
  - type: worker
    name: eclipse-crank
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm ci
    startCommand: npm run crank:price -- --unified
    autoDeploy: true
    envVars:
      - key: APP_URL
        value: https://eclipse-predict.vercel.app
      - key: CRANK_INTERVAL_MS
        value: "1000"
      - key: CRANK_LIMIT
        value: "10"
      - key: CRANK_REQUEST_TIMEOUT_MS
        value: "55000"
      - key: CRANK_UNIFIED
        value: "true"
      - key: CRANK_SECRET
        sync: false
